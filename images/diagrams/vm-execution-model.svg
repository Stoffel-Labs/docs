<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Stoffel VM execution model</title>
  <desc id="desc">Bytecode drives clear registers, secret registers, builtins, and protocol hooks</desc>
  <defs>
    <style>
:root { color-scheme: light; }
.bg { fill: #f8f8fc; }
.header { fill: #3448f0; }
.title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #ffffff; }
.subtitle { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #ffffff; }
.zone { fill: #ffffff; stroke: #b8bde8; stroke-width: 2; stroke-dasharray: 9 8; rx: 22; }
.zone-title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #17214f; letter-spacing: .02em; }
.card { fill: #ffffff; stroke: #c6cbef; stroke-width: 2; rx: 16; }
.card-lav { fill: #ebe9ff; stroke: #c6c0ff; }
.card-cream { fill: #fff6df; stroke: #edd797; }
.card-blue { fill: #3448f0; stroke: #2335c8; }
.card-party { fill: #ffffff; stroke: #3448f0; stroke-width: 3; }
.card-cyan { fill: #e5fbff; stroke: #7be4f5; }
.card-text { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #121a44; }
.card-sub { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #465078; }
.white { fill: #ffffff; }
.on-blue-title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 18px; font-weight: 700; }
.on-blue-sub { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 14px; font-weight: 700; }
.small { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #465078; }
.badge { fill: #5ee3ff; stroke: #28bfdc; stroke-width: 1.5; }
.badge-text { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #07133d; text-anchor: middle; dominant-baseline: middle; }
.arrow { stroke: #101a45; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
.arrow-soft { stroke: #3448f0; stroke-width: 2.5; fill: none; marker-end: url(#arrow-soft); stroke-linecap: round; stroke-linejoin: round; opacity: .85; }
.arrow-dash { stroke: #3448f0; stroke-width: 2.5; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow-soft); opacity: .72; }
.boundary { stroke: #3448f0; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; stroke-linecap: round; opacity: .72; }
.label-chip { fill: #ffffff; stroke: #d7daf4; stroke-width: 1; rx: 10; }
.label { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #24305f; text-anchor: middle; dominant-baseline: middle; }
</style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#101a45"/></marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3448f0"/></marker>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <rect class="header" x="0" y="0" width="1200" height="94"/>
  <text x="48" y="40" class="title">Stoffel VM execution model</text>
  <text x="48" y="68" class="subtitle" fill="#ffffff" opacity="1" style="fill:#ffffff;color:#ffffff">Bytecode drives clear registers, secret registers, builtins, and protocol hooks</text>
  <rect x="44" y="140" width="270" height="386" class="zone"/>
<text x="68" y="174" class="zone-title">Program artifact</text>
<rect x="360" y="140" width="470" height="386" class="zone"/>
<text x="384" y="174" class="zone-title">Stoffel VM core</text>
<rect x="884" y="140" width="272" height="386" class="zone"/>
<text x="908" y="174" class="zone-title">MPC hooks</text>
<rect x="84" y="246" width="190" height="78" class="card card-cream"/>
<text x="179" y="280" class="card-text" text-anchor="middle">.stflb bytecode</text>
<text x="179" y="306" class="card-sub" text-anchor="middle">functions + constants</text>
<rect x="430" y="184" width="330" height="78" class="card card-lav"/>
<text x="595" y="218" class="card-text" text-anchor="middle">instruction dispatcher</text>
<text x="595" y="244" class="card-sub" text-anchor="middle">program counter + opcodes</text>
<rect x="430" y="308" width="156" height="82" class="card card-cyan"/>
<text x="508" y="342" class="card-text" text-anchor="middle">clear registers</text>
<text x="508" y="368" class="card-sub" text-anchor="middle">public values</text>
<rect x="604" y="308" width="156" height="82" class="card card-blue"/>
<text x="682" y="342" class="on-blue-title" fill="#ffffff" opacity="1" style="fill:#ffffff;color:#ffffff" text-anchor="middle">secret registers</text>
<text x="682" y="368" class="on-blue-sub" fill="#ffffff" opacity="1" style="fill:#ffffff;color:#ffffff" text-anchor="middle">share values</text>
<rect x="430" y="438" width="330" height="62" class="card card-lav"/>
<text x="595" y="472" class="card-text" text-anchor="middle">runtime state stores</text>
<text x="595" y="498" class="card-sub" text-anchor="middle">objects, arrays, closures</text>
<rect x="920" y="214" width="200" height="78" class="card card-cream"/>
<text x="1020" y="248" class="card-text" text-anchor="middle">protocol builtins</text>
<text x="1020" y="274" class="card-sub" text-anchor="middle">share ops + reveal</text>
<rect x="920" y="360" width="200" height="78" class="card card-cream"/>
<text x="1020" y="394" class="card-text" text-anchor="middle">network parties</text>
<text x="1020" y="420" class="card-sub" text-anchor="middle">rounds for secret×secret</text>
<path d="M836,188 L836,466" class="boundary"/>
<rect x="778" y="166" width="116" height="28" class="label-chip"/>
<text x="836.0" y="180" class="label">MPC gate</text>
<path d="M274,285 L430,223" class="arrow"/>
<path d="M595,262 L595,286 L508,308" class="arrow"/>
<path d="M595,262 L595,286 L682,308" class="arrow"/>
<path d="M508,390 L508,438" class="arrow-soft"/>
<path d="M682,390 L682,438" class="arrow-soft"/>
<path d="M682,390 L682,410 L836,410 L836,253 L920,253" class="arrow"/>
<path d="M1020,292 L1020,360" class="arrow-soft"/>
