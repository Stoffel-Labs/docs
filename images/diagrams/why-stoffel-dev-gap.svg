<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">From protocol project to app workflow</title>
  <desc id="desc">Stoffel moves MPC work from bespoke plumbing into a repeatable developer loop</desc>
  <defs>
    <style>
:root { color-scheme: light; }
.bg { fill: #f8f8fc; }
.header { fill: #3448f0; }
.title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #ffffff; }
.subtitle { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #ffffff; }
.zone { fill: #ffffff; stroke: #b8bde8; stroke-width: 2; stroke-dasharray: 9 8; rx: 22; }
.zone-title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #17214f; letter-spacing: .02em; }
.card { fill: #ffffff; stroke: #c6cbef; stroke-width: 2; rx: 16; }
.card-lav { fill: #ebe9ff; stroke: #c6c0ff; }
.card-cream { fill: #fff6df; stroke: #edd797; }
.card-blue { fill: #3448f0; stroke: #2335c8; }
.card-party { fill: #ffffff; stroke: #3448f0; stroke-width: 3; }
.card-cyan { fill: #e5fbff; stroke: #7be4f5; }
.card-text { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #121a44; }
.card-sub { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #465078; }
.white { fill: #ffffff; }
.on-blue-title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 18px; font-weight: 700; }
.on-blue-sub { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 14px; font-weight: 700; }
.small { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #465078; }
.badge { fill: #5ee3ff; stroke: #28bfdc; stroke-width: 1.5; }
.badge-text { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #07133d; text-anchor: middle; dominant-baseline: middle; }
.arrow { stroke: #101a45; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
.arrow-soft { stroke: #3448f0; stroke-width: 2.5; fill: none; marker-end: url(#arrow-soft); stroke-linecap: round; stroke-linejoin: round; opacity: .85; }
.arrow-dash { stroke: #3448f0; stroke-width: 2.5; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow-soft); opacity: .72; }
.label-chip { fill: #ffffff; stroke: #d7daf4; stroke-width: 1; rx: 10; }
.label { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #24305f; text-anchor: middle; dominant-baseline: middle; }
</style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#101a45"/></marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#3448f0"/></marker>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <rect class="header" x="0" y="0" width="1200" height="94"/>
  <text x="48" y="40" class="title">From protocol project to app workflow</text>
  <text x="48" y="68" class="subtitle" fill="#ffffff" opacity="1" style="fill:#ffffff;color:#ffffff">Stoffel moves MPC work from bespoke plumbing into a repeatable developer loop</text>
  <rect x="54" y="136" width="492" height="386" class="zone"/>
<text x="78" y="170" class="zone-title">Traditional MPC project</text>
<rect x="654" y="136" width="492" height="386" class="zone"/>
<text x="678" y="170" class="zone-title">Stoffel project</text>
<rect x="92" y="202" width="170" height="82" class="card card-cream"/>
<text x="177" y="236" class="card-text" text-anchor="middle">protocol study</text>
<text x="177" y="262" class="card-sub" text-anchor="middle">paper + proofs</text>
<rect x="318" y="202" width="170" height="82" class="card card-cream"/>
<text x="403" y="236" class="card-text" text-anchor="middle">custom stack</text>
<text x="403" y="262" class="card-sub" text-anchor="middle">crypto + networking</text>
<rect x="206" y="356" width="170" height="82" class="card card-cream"/>
<text x="291" y="390" class="card-text" text-anchor="middle">late app test</text>
<text x="291" y="416" class="card-sub" text-anchor="middle">integration after plumbing</text>
<path d="M262,243 L318,243" class="arrow"/>
<path d="M403,284 C408,330 350,350 291,365" class="arrow-soft"/>
<rect x="174" y="476" width="252" height="28" class="label-chip"/>
<text x="300.0" y="490" class="label">specialized plumbing first</text>
<rect x="698" y="202" width="150" height="82" class="card card-lav"/>
<text x="773" y="236" class="card-text" text-anchor="middle">.stfl logic</text>
<text x="773" y="262" class="card-sub" text-anchor="middle">app computation</text>
<rect x="890" y="202" width="150" height="82" class="card card-cream"/>
<text x="965" y="236" class="card-text" text-anchor="middle">check + build</text>
<text x="965" y="262" class="card-sub" text-anchor="middle">.stflb artifact</text>
<rect x="794" y="356" width="150" height="82" class="card card-blue"/>
<text x="869" y="390" class="on-blue-title" fill="#ffffff" opacity="1" style="fill:#ffffff;color:#ffffff" text-anchor="middle">local MPC</text>
<text x="869" y="416" class="on-blue-sub" fill="#ffffff" opacity="1" style="fill:#ffffff;color:#ffffff" text-anchor="middle">party smoke test</text>
<rect x="980" y="356" width="130" height="82" class="card card-cyan"/>
<text x="1045" y="390" class="card-text" text-anchor="middle">Rust SDK</text>
<text x="1045" y="416" class="card-sub" text-anchor="middle">app boundary</text>
<path d="M848,243 L890,243" class="arrow"/>
<path d="M965,284 C970,330 900,350 870,356" class="arrow-soft"/>
<path d="M944,397 L980,397" class="arrow"/>
<rect x="780" y="476" width="272" height="28" class="label-chip"/>
<text x="916.0" y="490" class="label">application iteration stays visible</text>
</svg>
